    {id:329, week:4, day:28, exam:'1202', ref:'§2.1–2.2', q:'NTFS permissions vs Share permissions — what is the difference, and which wins when combined?', a:'NTFS applies locally regardless of access method; Share only applies over the network. The more restrictive of the two wins.'},
    {id:330, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is the main improvement of WPA3 over WPA2?', a:'Stronger encryption and protection against offline password-guessing attacks.'},
    {id:331, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is a trojan horse?', a:'Malware disguised as legitimate software to trick users into installing it.'},
    {id:332, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is a rootkit?', a:'Malware that hides deep in the system to maintain hidden, persistent access.'},
    {id:333, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is spyware?', a:'Malware that secretly monitors and collects user activity or information.'},
    {id:334, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is ransomware?', a:'Malware that encrypts a victim\'s data and demands payment for the decryption key.'},
    {id:335, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is the difference between phishing, tailgating, and shoulder surfing?', a:'Phishing is fraudulent messages tricking someone into giving up information; tailgating is following someone through a secured door without authorization; shoulder surfing is visually spying on entered credentials.'},
    {id:336, week:5, day:30, exam:'1202', ref:'§2.6–2.11', q:'What are the general steps to remove malware?', a:'Identify symptoms, quarantine the system, disable System Restore, remediate (update and scan), schedule future scans, re-enable System Restore, and educate the user.'},
    {id:337, week:5, day:30, exam:'1202', ref:'§2.6–2.11', q:'What does full device encryption protect against?', a:'Someone with physical access to a lost or stolen device reading its data.'},
    {id:338, week:5, day:30, exam:'1202', ref:'§2.6–2.11', q:'What is a certificate of destruction?', a:'Documented proof that a storage device was properly and securely destroyed.'},
    {id:347, week:5, day:30, exam:'1202', ref:'§2.10', q:'What does MAC filtering do on a SOHO network, and what is its weakness?', a:'It only allows approved MAC addresses to connect, but MAC addresses can be spoofed, so it is a weak standalone control.'},
    {id:348, week:5, day:30, exam:'1202', ref:'§2.10', q:'Why disable remote management on a SOHO router?', a:'It prevents someone outside your network from accessing the router admin settings over the internet.'},
    {id:349, week:5, day:30, exam:'1202', ref:'§2.10', q:'What is port forwarding, and why is it a security consideration?', a:'It lets external traffic reach a specific device/service inside your network, but it also opens a hole in your firewall, so only forward what is necessary.'},
    {id:339, week:5, day:31, exam:'1202', ref:'§3.1–3.4', q:'What is a sensible first step for repeated BSoDs?', a:'Check Event Viewer for recent driver or hardware changes, and try booting into Safe Mode to isolate the cause.'},
    {id:340, week:5, day:31, exam:'1202', ref:'§3.1–3.4', q:'What is the right response to a fake antivirus pop-up?', a:'Close it via Task Manager, run a scan with legitimate anti-malware software, and confirm the real AV is still intact.'},
    {id:341, week:5, day:32, exam:'1202', ref:'§4.1–4.5', q:'What is the difference between full, differential, and incremental backups?', a:'Full backs up everything; differential backs up everything changed since the last full; incremental backs up only what changed since the last backup of any type.'},
    {id:342, week:5, day:32, exam:'1202', ref:'§4.1–4.5', q:'What is the 3-2-1 backup rule?', a:'Keep 3 copies of data, on 2 different media types, with 1 copy stored offsite.'},
    {id:343, week:5, day:32, exam:'1202', ref:'§4.1–4.5', q:'How do you prevent ESD damage?', a:'Use an anti-static wrist strap or mat and ground yourself before touching internal components.'},
    {id:344, week:5, day:33, exam:'1202', ref:'§4.6–4.10', q:'What is chain of custody?', a:'A documented trail of who handled evidence, when, and how, to preserve its integrity.'},
    {id:345, week:5, day:33, exam:'1202', ref:'§4.6–4.10', q:'What is order of volatility?', a:'The sequence for collecting evidence from most to least likely to be lost — typically RAM before disk before logs or backups.'},
    {id:346, week:5, day:33, exam:'1202', ref:'§4.6–4.10', q:'What does a EULA define?', a:'The terms a user agrees to in order to legally use a piece of software.'},
  ];;;;

  let mastery = {};
  let activeFilter = 1;
  let activeDay = null;
  let strugglingOnly = false;
  let deck = [];
  let pos = 0;
  let flipped = false;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function currentWeekByDate() {
    const today = new Date();
    const t = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
    const ranges = [
      [1, '2026-06-19', '2026-06-25'], [2, '2026-06-26', '2026-07-02'],
      [3, '2026-07-03', '2026-07-09'], [4, '2026-07-10', '2026-07-16'],
      [5, '2026-07-17', '2026-07-23']
    ];
    for (const [w, start, end] of ranges) { if (t <= end) return w; }
    return 5;
  }

  const DAY_DATES = {
    1:'2026-06-19',2:'2026-06-20',3:'2026-06-21',4:'2026-06-22',5:'2026-06-23',6:'2026-06-24',7:'2026-06-25',
    8:'2026-06-26',9:'2026-06-27',10:'2026-06-28',11:'2026-06-29',12:'2026-06-30',13:'2026-07-01',14:'2026-07-02',
    15:'2026-07-03',16:'2026-07-04',17:'2026-07-05',18:'2026-07-06',19:'2026-07-07',20:'2026-07-08',21:'2026-07-09',
    22:'2026-07-10',23:'2026-07-11',24:'2026-07-12',25:'2026-07-13',26:'2026-07-14',27:'2026-07-15',28:'2026-07-16',
    29:'2026-07-17',30:'2026-07-18',31:'2026-07-19',32:'2026-07-20',33:'2026-07-21',34:'2026-07-22',35:'2026-07-23'
  };
  function currentDayId() {
    const today = new Date();
    const t = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
    const daysWithCards = [...new Set(CARDS.map(c => c.day))].sort((a,b)=>a-b);
    let best = daysWithCards[0];
    for (const d of daysWithCards) { if (DAY_DATES[d] <= t) best = d; else break; }
    return best;
  }

  async function loadMastery() {
    try {
      const raw = localStorage.getItem('aplus-flashcards');
      if (raw) mastery = JSON.parse(raw);
    } catch (e) { mastery = {}; }
  }
  async function saveMastery() {
    try { localStorage.setItem('aplus-flashcards', JSON.stringify(mastery)); } catch (e) {}
  }

  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildDeck() {
    let pool = activeFilter === 'all' ? CARDS.slice() : CARDS.filter(c => c.week === activeFilter);
    if (activeFilter !== 'all' && activeDay !== null) pool = pool.filter(c => c.day === activeDay);
    if (strugglingOnly) pool = pool.filter(c => mastery[c.id] === false);
    deck = pool;
    pos = 0;
    flipped = false;
  }

  function renderFilters() {
    const wrap = self.querySelector('#fc-filters');
    wrap.innerHTML = '';
    const weeks = [1,2,3,4,5];
    weeks.forEach(w => {
      const b = document.createElement('button');
      b.className = 'fc-chip' + (activeFilter === w ? ' active' : '');
      b.textContent = 'Week ' + w;
      b.addEventListener('click', () => { activeFilter = w; activeDay = null; buildDeck(); render(); });
      wrap.appendChild(b);
    });
    const allBtn = document.createElement('button');
    allBtn.className = 'fc-chip' + (activeFilter === 'all' ? ' active' : '');
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', () => { activeFilter = 'all'; activeDay = null; buildDeck(); render(); });
    wrap.appendChild(allBtn);

    const strBtn = document.createElement('button');
    strBtn.className = 'fc-chip struggling' + (strugglingOnly ? ' active' : '');
    strBtn.textContent = 'Struggling only';
    strBtn.addEventListener('click', () => { strugglingOnly = !strugglingOnly; buildDeck(); render(); });
    wrap.appendChild(strBtn);

    if (activeFilter !== 'all') {
      const dayWrap = document.createElement('div');
      dayWrap.className = 'fc-day-row';
      const wholeBtn = document.createElement('button');
      wholeBtn.className = 'fc-daychip' + (activeDay === null ? ' active' : '');
      wholeBtn.textContent = 'Whole week';
      wholeBtn.addEventListener('click', () => { activeDay = null; buildDeck(); render(); });
      dayWrap.appendChild(wholeBtn);
      const daysInWeek = [...new Set(CARDS.filter(c => c.week === activeFilter).map(c => c.day))].sort((a,b)=>a-b);
      daysInWeek.forEach(d => {
        const db = document.createElement('button');
        db.className = 'fc-daychip' + (activeDay === d ? ' active' : '');
        db.textContent = 'Day ' + d;
        db.addEventListener('click', () => { activeDay = d; buildDeck(); render(); });
        dayWrap.appendChild(db);
      });
      wrap.appendChild(dayWrap);
    }
  }

  function renderStage() {
    const inner = self.querySelector('#fc-stage-inner');
    const counter = self.querySelector('#fc-counter');
    inner.innerHTML = '';

    if (deck.length === 0) {
      counter.textContent = '';
      const empty = document.createElement('div');
      empty.className = 'fc-empty';
      empty.textContent = strugglingOnly
        ? 'Nothing marked "still shaky" in this view yet. Flip some cards and rate them honestly — the tricky ones will show up here.'
        : 'No cards in this view.';
      inner.appendChild(empty);
      return;
    }

    counter.textContent = 'Card ' + (pos + 1) + ' of ' + deck.length;
    const card = deck[pos];

    const wrap = document.createElement('div');
    wrap.className = 'fc-card-wrap';
    const cardEl = document.createElement('div');
    cardEl.className = 'fc-card' + (flipped ? ' flipped' : '');
    cardEl.tabIndex = 0;
    cardEl.innerHTML =
      '<div class="fc-face front">' +
        '<div class="fc-tab">' + card.exam + ' ' + card.ref + '</div>' +
        '<div class="fc-label">Question</div>' +
        '<div class="fc-text">' + card.q + '</div>' +
        '<div class="fc-hint">Tap to reveal</div>' +
      '</div>' +
      '<div class="fc-face back">' +
        '<div class="fc-tab">' + card.exam + ' ' + card.ref + '</div>' +
        '<div class="fc-label">Answer</div>' +
        '<div class="fc-text">' + card.a + '</div>' +
      '</div>';
    function toggleFlip() { flipped = !flipped; cardEl.classList.toggle('flipped', flipped); rateRow.classList.toggle('show', flipped); }
    cardEl.addEventListener('click', toggleFlip);
    cardEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleFlip(); } });
    wrap.appendChild(cardEl);
    inner.appendChild(wrap);

    const rateRow = document.createElement('div');
    rateRow.className = 'fc-rate-row' + (flipped ? ' show' : '');
    rateRow.innerHTML =
      '<button class="fc-rate shaky">Still shaky</button>' +
      '<button class="fc-rate got-it">Got it</button>';
    rateRow.querySelector('.shaky').addEventListener('click', () => rate(card.id, false));
    rateRow.querySelector('.got-it').addEventListener('click', () => rate(card.id, true));
    inner.appendChild(rateRow);

    const navRow = document.createElement('div');
    navRow.className = 'fc-nav-row';
    navRow.innerHTML =
      '<button class="fc-nav-btn" id="fc-prev">‹ Prev</button>' +
      '<button class="fc-nav-btn" id="fc-shuffle">Shuffle</button>' +
      '<button class="fc-nav-btn" id="fc-next">Next ›</button>';
    inner.appendChild(navRow);
    navRow.querySelector('#fc-prev').addEventListener('click', () => { pos = (pos - 1 + deck.length) % deck.length; flipped = false; renderStage(); });
    navRow.querySelector('#fc-next').addEventListener('click', () => { pos = (pos + 1) % deck.length; flipped = false; renderStage(); });
    navRow.querySelector('#fc-shuffle').addEventListener('click', () => { deck = shuffleArr(deck); pos = 0; flipped = false; renderStage(); });
  }

  function rate(id, gotIt) {
    mastery[id] = gotIt;
    saveMastery();
    if (strugglingOnly && gotIt) {
      deck = deck.filter(c => c.id !== id);
      if (pos >= deck.length) pos = 0;
    } else {
      pos = (pos + 1) % Math.max(deck.length, 1);
    }
    flipped = false;
    renderStage();
    renderFooter();
  }

  function renderFooter() {
    const total = deck.length || 1;
    const known = deck.filter(c => mastery[c.id] === true).length;
    self.querySelector('#fc-progress-fill').style.width = Math.round((known / total) * 100) + '%';
    self.querySelector('#fc-progress-text').textContent = known + ' / ' + deck.length + ' marked "got it"';
  }

  function render() {
    renderFilters();
    renderStage();
    renderFooter();
  }

  self.querySelector('#fc-reset').addEventListener('click', () => {
    if (confirm('Clear all "got it / still shaky" ratings? This cannot be undone.')) {
      mastery = {};
      saveMastery();
      render();
    }
  });

  (async function init() {
    await loadMastery();
    activeFilter = currentWeekByDate();
    activeDay = currentDayId();
    buildDeck();
    render();
  })();
})();
</script>
