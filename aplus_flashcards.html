<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A+ Flashcards">
<meta name="theme-color" content="#1E2229">
<title>A+ Flashcards</title>
<style>
body { margin: 0; padding: 12px; background: #1E2229; -webkit-text-size-adjust: 100%; }
</style>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

.fc-root {
  --bg: #1E2229;
  --panel: #262B33;
  --panel-2: #2F3540;
  --hairline: #3A4150;
  --paper: #ECE6D6;
  --paper-2: #DDD4BC;
  --ink: #2A2520;
  --ink-dim: #6B645A;
  --copper: #C97A3D;
  --copper-soft: #E0A765;
  --resolved: #4F8B6B;
  --sla: #B5503D;
  --text: #D8D3C4;
  --text-dim: #8E8A7C;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --sans: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  border-radius: 12px;
  max-width: 560px;
  margin: 0 auto;
  border: 1px solid var(--hairline);
  overflow: hidden;
}
.fc-root * { box-sizing: border-box; }

.fc-header {
  padding: 18px 22px 14px;
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border-bottom: 1px solid var(--hairline);
}
.fc-title {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--copper-soft);
  margin: 0 0 3px;
}
.fc-subtitle { font-size: 13px; color: var(--text-dim); margin: 0; }

.fc-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.fc-chip {
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 5px;
  border: 1px solid var(--hairline);
  background: var(--bg);
  color: var(--text-dim);
  cursor: pointer;
}
.fc-chip:hover { color: var(--text); }
.fc-chip.active { border-color: var(--copper); color: var(--copper-soft); background: rgba(201,122,61,0.1); }
.fc-chip.struggling.active { border-color: var(--sla); color: var(--sla); background: rgba(181,80,61,0.1); }

.fc-day-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--hairline);
  width: 100%;
}
.fc-daychip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--hairline);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
}
.fc-daychip:hover { color: var(--text); }
.fc-daychip.active { border-color: var(--resolved); color: var(--resolved-soft); background: rgba(79,139,107,0.1); }

.fc-stage {
  padding: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg);
}

.fc-counter {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

.fc-empty {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  padding: 40px 10px;
}

.fc-card-wrap {
  width: 100%;
  max-width: 420px;
  height: 230px;
  perspective: 1400px;
}
.fc-card {
  width: 100%;
  height: 100%;
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(.4,.2,.2,1);
}
.fc-card:focus-visible { outline: 2px solid var(--copper); outline-offset: 4px; }
.fc-card.flipped { transform: rotateY(180deg); }

@media (prefers-reduced-motion: reduce) {
  .fc-card { transition: none; }
}

.fc-face {
  position: absolute;
  inset: 0;
  border-radius: 6px;
  background: var(--paper);
  color: var(--ink);
  backface-visibility: hidden;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 24px -10px rgba(0,0,0,0.55);
}
.fc-face.back { transform: rotateY(180deg); background: var(--paper-2); }

.fc-tab {
  position: absolute;
  top: -1px;
  right: 18px;
  background: var(--copper);
  color: #fff;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  padding: 3px 8px 4px;
  border-radius: 0 0 4px 4px;
}

.fc-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 10px;
}
.fc-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.4;
  flex: 1;
  display: flex;
  align-items: center;
}
.fc-face.back .fc-text { font-size: 15px; font-weight: 500; }
.fc-hint {
  font-size: 11px;
  color: var(--ink-dim);
  text-align: center;
  font-family: var(--mono);
}

.fc-rate-row {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  width: 100%;
  max-width: 420px;
  visibility: hidden;
}
.fc-rate-row.show { visibility: visible; }
.fc-rate {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  cursor: pointer;
  border: 1px solid var(--hairline);
  background: var(--panel);
  color: var(--text);
}
.fc-rate.shaky:hover { border-color: var(--sla); color: var(--sla); }
.fc-rate.got-it:hover { border-color: var(--resolved); color: var(--resolved); }

.fc-nav-row {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.fc-nav-btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 7px 12px;
  border-radius: 5px;
  border: 1px solid var(--hairline);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
}
.fc-nav-btn:hover { color: var(--text); border-color: var(--copper-soft); }

.fc-footer {
  padding: 14px 22px 18px;
  background: var(--panel);
  border-top: 1px solid var(--hairline);
}
.fc-progress-track {
  height: 6px;
  border-radius: 4px;
  background: var(--bg);
  border: 1px solid var(--hairline);
  overflow: hidden;
}
.fc-progress-fill { height: 100%; background: linear-gradient(90deg, var(--copper), var(--resolved)); }
.fc-progress-label {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-dim);
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
}
.fc-reset {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-dim);
  background: none;
  border: 1px solid var(--hairline);
  border-radius: 4px;
  padding: 5px 10px;
  cursor: pointer;
  font-family: var(--mono);
}
.fc-reset:hover { border-color: var(--sla); color: var(--sla); }
</style>
</head>
<body>

<div class="fc-root">
  <div class="fc-header">
    <p class="fc-title">A+ Quick-Reference Cards</p>
    <p class="fc-subtitle">Every "Memorize" line from your study queue, atomized into one fact per card.</p>
    <div class="fc-filters" id="fc-filters"></div>
  </div>

  <div class="fc-stage">
    <div class="fc-counter" id="fc-counter">Card 1 of 1</div>
    <div id="fc-stage-inner"></div>
  </div>

  <div class="fc-footer">
    <div class="fc-progress-track"><div class="fc-progress-fill" id="fc-progress-fill" style="width:0%"></div></div>
    <div class="fc-progress-label"><span id="fc-progress-text">0 / 0 marked "got it"</span><span>this view</span></div>
    <button class="fc-reset" id="fc-reset">Reset all ratings</button>
  </div>
</div>

    {id:114, week:1, day:3, exam:'1201', ref:'§2.1', q:'What is the well-known (non-ephemeral) port range?', a:'0–1023'},
    {id:115, week:1, day:3, exam:'1201', ref:'§2.1', q:'What is the ephemeral (client) port range?', a:'1024–65535'},
    {id:116, week:1, day:3, exam:'1201', ref:'§2.1', q:'What is the key difference between TCP and UDP?', a:'TCP is connection-oriented and reliable (handshake, acknowledgments, retransmission, flow control); UDP is connectionless and unreliable, with less overhead.'},
    {id:117, week:1, day:3, exam:'1201', ref:'§2.1', q:'Why do real-time apps like VoIP prefer UDP over TCP?', a:'Lower overhead, and a dropped packet in real time cannot be replayed anyway, so reliability is not worth the cost.'},

    {id:26, week:1, day:5, exam:'1201', ref:'§2.4', q:'What does an A record do?', a:'Maps a hostname to an IPv4 address.'},
    {id:27, week:1, day:5, exam:'1201', ref:'§2.4', q:'What does an AAAA record do?', a:'Maps a hostname to an IPv6 address.'},

    {id:33, week:1, day:6, exam:'1201', ref:'§2.5–2.6', q:'What is the Class A private IP range?', a:'10.0.0.0 to 10.255.255.255'},

    {id:37, week:1, day:7, exam:'1201', ref:'§2.7–2.8', q:'What is a crimper used for?', a:'Attaching connectors, like RJ45, to the end of a network cable.'},
    {id:38, week:1, day:7, exam:'1201', ref:'§2.7–2.8', q:'What is a punch-down tool used for?', a:'Pushing wires into a punch-down block or patch panel.'},
    {id:39, week:1, day:7, exam:'1201', ref:'§2.7–2.8', q:'What is a cable tester used for?', a:'Verifying a cable is wired correctly end-to-end.'},
    {id:40, week:1, day:7, exam:'1201', ref:'§2.7–2.8', q:'What is a loopback plug used for?', a:'Testing a port by looping its send signal back into its receive line.'},
    {id:41, week:1, day:7, exam:'1201', ref:'§2.7–2.8', q:'What is a tone generator and probe used for?', a:'Tracing a specific cable through a bundle or wall.'},
    {id:42, week:2, day:8, exam:'1201', ref:'§3.1–3.2', q:'What is the difference between T568A and T568B?', a:'Same 8 wires, but the orange and green pairs are swapped — both ends just need to match.'},
    {id:43, week:2, day:8, exam:'1201', ref:'§3.1–3.2', q:'What is the difference between multimode and single-mode fiber?', a:'Multimode has a larger core for shorter distances (LED light, cheaper); single-mode has a smaller core for long distances (laser light, pricier).'},

    {id:48, week:2, day:10, exam:'1201', ref:'§3.3–3.4', q:'What does RAID 0 provide?', a:'Striping for speed only — no redundancy, so one drive failure loses all data.'},
    {id:49, week:2, day:10, exam:'1201', ref:'§3.3–3.4', q:'What does RAID 1 provide?', a:'Mirroring — full redundancy by duplicating data across two drives.'},
    {id:50, week:2, day:10, exam:'1201', ref:'§3.3–3.4', q:'What does RAID 5 provide?', a:'Striping with parity across three or more drives — survives one drive failure.'},
    {id:51, week:2, day:10, exam:'1201', ref:'§3.3–3.4', q:'What does RAID 6 provide?', a:'Striping with double parity — survives two drive failures.'},
    {id:52, week:2, day:10, exam:'1201', ref:'§3.3–3.4', q:'What does RAID 1+0 (RAID 10) provide?', a:'Mirrored pairs that are then striped together — combines redundancy and speed.'},
    {id:53, week:2, day:11, exam:'1201', ref:'§3.5', q:'Order ATX, micro-ATX, and Mini-ITX from largest to smallest.', a:'ATX, then micro-ATX, then Mini-ITX.'},
    {id:54, week:2, day:11, exam:'1201', ref:'§3.5', q:'What is the key difference between PCI and PCIe?', a:'PCI is an older shared parallel bus; PCIe is a faster serial point-to-point connection used in modern systems.'},
    {id:55, week:2, day:12, exam:'1201', ref:'§3.5 cont.', q:'What is a TPM used for?', a:'Hardware-based storage of encryption keys and secure boot or cryptographic functions.'},

    {id:57, week:2, day:12, exam:'1201', ref:'§3.5 cont.', q:'What is the main tradeoff between air cooling and liquid cooling?', a:'Air cooling is simpler and cheaper; liquid cooling is quieter and handles more heat, but costs more and carries a small leak risk.'},

    {id:59, week:2, day:13, exam:'1201', ref:'§3.6–3.8', q:'What does a power supply efficiency rating (like 80 Plus) tell you?', a:'How much input power becomes usable output power versus being wasted as heat.'},
    {id:60, week:2, day:14, exam:'1201', ref:'§3.8 cont.', q:'What commonly causes faded or blank output on a thermal printer?', a:'A worn heating element or using non-thermal paper.'},

    {id:62, week:3, day:15, exam:'1201', ref:'§4.1–4.2', q:'What is the difference between a Type 1 and Type 2 hypervisor?', a:'Type 1 runs directly on the hardware; Type 2 runs on top of a host operating system.'},
    {id:63, week:3, day:15, exam:'1201', ref:'§4.1–4.2', q:'What does IaaS provide?', a:'Rented virtual infrastructure — servers, storage, and networking.'},

    {id:65, week:3, day:15, exam:'1201', ref:'§4.1–4.2', q:'What does SaaS provide?', a:'Fully managed, ready-to-use software delivered over the internet.'},
    {id:66, week:3, day:16, exam:'1201', ref:'§5.1–5.2', q:'What are CompTIA\'s six troubleshooting methodology steps, in order?', a:'Identify the problem; establish a theory of probable cause; test the theory; establish a plan of action; verify full system functionality; document findings.'},
    {id:67, week:3, day:16, exam:'1201', ref:'§5.1–5.2', q:'What is POST?', a:'Power-On Self-Test — hardware checks a computer runs at startup.'},
    {id:68, week:3, day:16, exam:'1201', ref:'§5.1–5.2', q:'What is a BSoD?', a:'Blue Screen of Death — a Windows stop error showing a critical system failure.'},
    {id:69, week:3, day:16, exam:'1201', ref:'§5.1–5.2', q:'What does S.M.A.R.T. monitor?', a:'A drive\'s health indicators, used to predict failure in advance.'},
    {id:70, week:3, day:16, exam:'1201', ref:'§5.1–5.2', q:'What does IOPS measure?', a:'A storage device\'s input/output operations per second — its performance.'},
    {id:71, week:3, day:17, exam:'1201', ref:'§5.3–5.4', q:'What is the difference between screen burn-in and a dead pixel?', a:'Burn-in is a temporary or permanent ghost image from static content; a dead pixel never lights up at all.'},
    {id:72, week:3, day:17, exam:'1201', ref:'§5.3–5.4', q:'What problem does a faulty digitizer cause?', a:'Touch input that does not register, or registers in the wrong location.'},
    {id:73, week:3, day:18, exam:'1201', ref:'§5.5–5.6', q:'What is the difference between latency and jitter?', a:'Latency is the delay for data to travel; jitter is how much that delay varies over time.'},
    {id:74, week:3, day:18, exam:'1201', ref:'§5.5–5.6', q:'What commonly causes a stuck print queue?', a:'A corrupted print job or a stopped print spooler service.'},
    {id:75, week:4, day:22, exam:'1202', ref:'§1.1–1.2', q:'What file system does modern Windows use by default?', a:'NTFS.'},
    {id:76, week:4, day:22, exam:'1202', ref:'§1.1–1.2', q:'What is exFAT typically used for?', a:'Flash or external drives that need to work across Windows, macOS, and other systems without FAT32\'s file-size limits.'},

    {id:94, week:4, day:28, exam:'1202', ref:'§2.1–2.2', q:'What is Zero Trust?', a:'A security model that verifies every request and never automatically trusts a user or device, even inside the network.'},

    {id:97, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is the main improvement of WPA3 over WPA2?', a:'Stronger encryption and protection against offline password-guessing attacks.'},
    {id:98, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is a trojan horse?', a:'Malware disguised as legitimate software to trick users into installing it.'},

    {id:101, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is ransomware?', a:'Malware that encrypts a victim\'s data and demands payment for the decryption key.'},
    {id:102, week:5, day:29, exam:'1202', ref:'§2.3–2.5', q:'What is the difference between phishing, tailgating, and shoulder surfing?', a:'Phishing is fraudulent messages tricking someone into giving up information; tailgating is following someone through a secured door without authorization; shoulder surfing is visually spying on entered credentials.'},
    {id:103, week:5, day:30, exam:'1202', ref:'§2.6–2.11', q:'What are the general steps to remove malware?', a:'Identify symptoms, quarantine the system, disable System Restore, remediate (update and scan), schedule future scans, re-enable System Restore, and educate the user.'},
    {id:104, week:5, day:30, exam:'1202', ref:'§2.6–2.11', q:'What does full device encryption protect against?', a:'Someone with physical access to a lost or stolen device reading its data.'},

    {id:107, week:5, day:31, exam:'1202', ref:'§3.1–3.4', q:'What is the right response to a fake antivirus pop-up?', a:'Close it via Task Manager, run a scan with legitimate anti-malware software, and confirm the real AV is still intact.'},
    {id:108, week:5, day:32, exam:'1202', ref:'§4.1–4.5', q:'What is the difference between full, differential, and incremental backups?', a:'Full backs up everything; differential backs up everything changed since the last full; incremental backs up only what changed since the last backup of any type.'},

    {id:111, week:5, day:33, exam:'1202', ref:'§4.6–4.10', q:'What is chain of custody?', a:'A documented trail of who handled evidence, when, and how, to preserve its integrity.'},
    {id:112, week:5, day:33, exam:'1202', ref:'§4.6–4.10', q:'What is order of volatility?', a:'The sequence for collecting evidence from most to least likely to be lost — typically RAM before disk before logs or backups.'},

  ];

  let mastery = {};
  let activeFilter = 1;
  let activeDay = null;
  let strugglingOnly = false;
  let deck = [];
  let pos = 0;
  let flipped = false;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function currentWeekByDate() {
    const today = new Date();
    const t = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
    const ranges = [
      [1, '2026-06-19', '2026-06-25'], [2, '2026-06-26', '2026-07-02'],
      [3, '2026-07-03', '2026-07-09'], [4, '2026-07-10', '2026-07-16'],
      [5, '2026-07-17', '2026-07-23']
    ];
    for (const [w, start, end] of ranges) { if (t <= end) return w; }
    return 5;
  }

  const DAY_DATES = {
    1:'2026-06-19',2:'2026-06-20',3:'2026-06-21',4:'2026-06-22',5:'2026-06-23',6:'2026-06-24',7:'2026-06-25',
    8:'2026-06-26',9:'2026-06-27',10:'2026-06-28',11:'2026-06-29',12:'2026-06-30',13:'2026-07-01',14:'2026-07-02',
    15:'2026-07-03',16:'2026-07-04',17:'2026-07-05',18:'2026-07-06',19:'2026-07-07',20:'2026-07-08',21:'2026-07-09',
    22:'2026-07-10',23:'2026-07-11',24:'2026-07-12',25:'2026-07-13',26:'2026-07-14',27:'2026-07-15',28:'2026-07-16',
    29:'2026-07-17',30:'2026-07-18',31:'2026-07-19',32:'2026-07-20',33:'2026-07-21',34:'2026-07-22',35:'2026-07-23'
  };
  function currentDayId() {
    const today = new Date();
    const t = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
    const daysWithCards = [...new Set(CARDS.map(c => c.day))].sort((a,b)=>a-b);
    let best = daysWithCards[0];
    for (const d of daysWithCards) { if (DAY_DATES[d] <= t) best = d; else break; }
    return best;
  }

  async function loadMastery() {
    try {
      const raw = localStorage.getItem('aplus-flashcards');
      if (raw) mastery = JSON.parse(raw);
    } catch (e) { mastery = {}; }
  }
  async function saveMastery() {
    try { localStorage.setItem('aplus-flashcards', JSON.stringify(mastery)); } catch (e) {}
  }

  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildDeck() {
    let pool = activeFilter === 'all' ? CARDS.slice() : CARDS.filter(c => c.week === activeFilter);
    if (activeFilter !== 'all' && activeDay !== null) pool = pool.filter(c => c.day === activeDay);
    if (strugglingOnly) pool = pool.filter(c => mastery[c.id] === false);
    deck = pool;
    pos = 0;
    flipped = false;
  }

  function renderFilters() {
    const wrap = self.querySelector('#fc-filters');
    wrap.innerHTML = '';
    const weeks = [1,2,3,4,5];
    weeks.forEach(w => {
      const b = document.createElement('button');
      b.className = 'fc-chip' + (activeFilter === w ? ' active' : '');
      b.textContent = 'Week ' + w;
      b.addEventListener('click', () => { activeFilter = w; activeDay = null; buildDeck(); render(); });
      wrap.appendChild(b);
    });
    const allBtn = document.createElement('button');
    allBtn.className = 'fc-chip' + (activeFilter === 'all' ? ' active' : '');
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', () => { activeFilter = 'all'; activeDay = null; buildDeck(); render(); });
    wrap.appendChild(allBtn);

    const strBtn = document.createElement('button');
    strBtn.className = 'fc-chip struggling' + (strugglingOnly ? ' active' : '');
    strBtn.textContent = 'Struggling only';
    strBtn.addEventListener('click', () => { strugglingOnly = !strugglingOnly; buildDeck(); render(); });
    wrap.appendChild(strBtn);

    if (activeFilter !== 'all') {
      const dayWrap = document.createElement('div');
      dayWrap.className = 'fc-day-row';
      const wholeBtn = document.createElement('button');
      wholeBtn.className = 'fc-daychip' + (activeDay === null ? ' active' : '');
      wholeBtn.textContent = 'Whole week';
      wholeBtn.addEventListener('click', () => { activeDay = null; buildDeck(); render(); });
      dayWrap.appendChild(wholeBtn);
      const daysInWeek = [...new Set(CARDS.filter(c => c.week === activeFilter).map(c => c.day))].sort((a,b)=>a-b);
      daysInWeek.forEach(d => {
        const db = document.createElement('button');
        db.className = 'fc-daychip' + (activeDay === d ? ' active' : '');
        db.textContent = 'Day ' + d;
        db.addEventListener('click', () => { activeDay = d; buildDeck(); render(); });
        dayWrap.appendChild(db);
      });
      wrap.appendChild(dayWrap);
    }
  }

  function renderStage() {
    const inner = self.querySelector('#fc-stage-inner');
    const counter = self.querySelector('#fc-counter');
    inner.innerHTML = '';

    if (deck.length === 0) {
      counter.textContent = '';
      const empty = document.createElement('div');
      empty.className = 'fc-empty';
      empty.textContent = strugglingOnly
        ? 'Nothing marked "still shaky" in this view yet. Flip some cards and rate them honestly — the tricky ones will show up here.'
        : 'No cards in this view.';
      inner.appendChild(empty);
      return;
    }

    counter.textContent = 'Card ' + (pos + 1) + ' of ' + deck.length;
    const card = deck[pos];

    const wrap = document.createElement('div');
    wrap.className = 'fc-card-wrap';
    const cardEl = document.createElement('div');
    cardEl.className = 'fc-card' + (flipped ? ' flipped' : '');
    cardEl.tabIndex = 0;
    cardEl.innerHTML =
      '<div class="fc-face front">' +
        '<div class="fc-tab">' + card.exam + ' ' + card.ref + '</div>' +
        '<div class="fc-label">Question</div>' +
        '<div class="fc-text">' + card.q + '</div>' +
        '<div class="fc-hint">Tap to reveal</div>' +
      '</div>' +
      '<div class="fc-face back">' +
        '<div class="fc-tab">' + card.exam + ' ' + card.ref + '</div>' +
        '<div class="fc-label">Answer</div>' +
        '<div class="fc-text">' + card.a + '</div>' +
      '</div>';
    function toggleFlip() { flipped = !flipped; cardEl.classList.toggle('flipped', flipped); rateRow.classList.toggle('show', flipped); }
    cardEl.addEventListener('click', toggleFlip);
    cardEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleFlip(); } });
    wrap.appendChild(cardEl);
    inner.appendChild(wrap);

    const rateRow = document.createElement('div');
    rateRow.className = 'fc-rate-row' + (flipped ? ' show' : '');
    rateRow.innerHTML =
      '<button class="fc-rate shaky">Still shaky</button>' +
      '<button class="fc-rate got-it">Got it</button>';
    rateRow.querySelector('.shaky').addEventListener('click', () => rate(card.id, false));
    rateRow.querySelector('.got-it').addEventListener('click', () => rate(card.id, true));
    inner.appendChild(rateRow);

    const navRow = document.createElement('div');
    navRow.className = 'fc-nav-row';
    navRow.innerHTML =
      '<button class="fc-nav-btn" id="fc-prev">‹ Prev</button>' +
      '<button class="fc-nav-btn" id="fc-shuffle">Shuffle</button>' +
      '<button class="fc-nav-btn" id="fc-next">Next ›</button>';
    inner.appendChild(navRow);
    navRow.querySelector('#fc-prev').addEventListener('click', () => { pos = (pos - 1 + deck.length) % deck.length; flipped = false; renderStage(); });
    navRow.querySelector('#fc-next').addEventListener('click', () => { pos = (pos + 1) % deck.length; flipped = false; renderStage(); });
    navRow.querySelector('#fc-shuffle').addEventListener('click', () => { deck = shuffleArr(deck); pos = 0; flipped = false; renderStage(); });
  }

  function rate(id, gotIt) {
    mastery[id] = gotIt;
    saveMastery();
    if (strugglingOnly && gotIt) {
      deck = deck.filter(c => c.id !== id);
      if (pos >= deck.length) pos = 0;
    } else {
      pos = (pos + 1) % Math.max(deck.length, 1);
    }
    flipped = false;
    renderStage();
    renderFooter();
  }

  function renderFooter() {
    const total = deck.length || 1;
    const known = deck.filter(c => mastery[c.id] === true).length;
    self.querySelector('#fc-progress-fill').style.width = Math.round((known / total) * 100) + '%';
    self.querySelector('#fc-progress-text').textContent = known + ' / ' + deck.length + ' marked "got it"';
  }

  function render() {
    renderFilters();
    renderStage();
    renderFooter();
  }

  self.querySelector('#fc-reset').addEventListener('click', () => {
    if (confirm('Clear all "got it / still shaky" ratings? This cannot be undone.')) {
      mastery = {};
      saveMastery();
      render();
    }
  });

  (async function init() {
    await loadMastery();
    activeFilter = currentWeekByDate();
    activeDay = currentDayId();
    buildDeck();
    render();
  })();
})();
</script>
